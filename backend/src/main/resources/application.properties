spring.application.name=url_shortner

# Import optional private local properties if present (ignored by git)
spring.config.import=optional:classpath:application-local.properties

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/url_shortner_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# SMTP Mail Configuration (Gmail SMTP)
# Safe placeholders for public GitHub repository safety
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-gmail-account@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-16-character-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true